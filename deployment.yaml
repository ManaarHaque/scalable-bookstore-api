apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: manaarishere/bookstore-app:latest 
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_HOST
          value: "mongodb-service" 
        - name: MONGO_PORT
          value: "27017"
        - name: MONGO_USER
          value: "admin"
        - name: MONGO_PASS
          value: "admin"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  selector:
    app: flask-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer # Or NodePort if running locally like Minikube